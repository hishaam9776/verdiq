<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel - Proof Approvals</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #07120d;
      color: white;
      padding: 30px;
    }

    h1 {
      color: #8cffb0;
      margin-bottom: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.06);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 15px;
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .card img {
      width: 120px;
      border-radius: 10px;
    }

    .info {
      flex: 1;
    }

    .btn {
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      margin-right: 10px;
    }

    .approve {
      background: #8cffb0;
    }

    .reject {
      background: #ff5c5c;
      color: white;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .back {
      background: transparent;
      border: 1px solid #8cffb0;
      color: #8cffb0;
      padding: 10px 15px;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="topbar">
    <h1>🛡 Admin Proof Panel</h1>
    <button class="back" onclick="window.location.href='dashboard.html'">
      Back
    </button>
  </div>

  <div id="list"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="js/app.js"></script>

<script>
  auth.onAuthStateChanged(user => {
    if (user) {
      loadAdminRequests();
    } else {
      alert("Login required");
      window.location.href = "login.html";
    }
  });
</script>

</body>
</html>
