<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rewards Store</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #07120d; /* Kept your exact original dark green background */
      color: white;
      padding: 30px;
    }

    h1 {
      color: #8cffb0;
      margin-bottom: 20px;
    }

    /* TOP BAR */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .back-btn {
      background: #8cffb0;
      border: none;
      padding: 10px 15px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      color: #07120d;
    }

    /* REWARDS GRID */
    .rewards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    /* CARD */
    .reward-card {
      background: rgba(255,255,255,0.06);
      border-radius: 15px;
      padding: 20px;
      backdrop-filter: blur(10px);
      transition: 0.2s ease;
    }

    .reward-card:hover {
      transform: translateY(-5px);
      background: rgba(140,255,176,0.08);
    }

    .reward-card h3 {
      color: #8cffb0;
      margin-bottom: 10px;
    }

    .reward-card p {
      opacity: 0.8;
      margin-bottom: 10px;
    }

    /* SIGNATURE YELLOW REDEEM BUTTONS */
    .reward-card button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #fbbf24; 
      color: #0c0f12; 
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .reward-card button:hover {
      background: #f59e0b; 
      transform: scale(1.05);
    }

    /* MOBILE */
    @media (max-width: 600px) {
      body {
        padding: 15px;
      }
    }

    /* =========================
       REDEEM MODAL & ERRORS (UPDATED)
    ========================= */
    .redeem-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .redeem-box {
      background: #0d1e17;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      width: 300px;
      animation: pop 0.3s ease;
      border: 1px solid rgba(140,255,176,0.3);
      transition: border 0.3s ease;
    }

    .checkmark {
      font-size: 50px;
      color: #8cffb0;
      margin-bottom: 10px;
      animation: bounce 0.6s ease;
      transition: color 0.3s ease;
    }

    .redeem-box h2 {
      color: #8cffb0;
      margin-bottom: 10px;
      transition: color 0.3s ease;
    }

    /* RED ERROR STATE MODIFIERS */
    .redeem-modal.error-state .redeem-box {
      border: 1px solid rgba(239, 68, 68, 0.5); /* Soft red border */
    }

    .redeem-modal.error-state .checkmark {
      color: #ef4444; /* Red warning icon */
    }

    .redeem-modal.error-state #redeem-title {
      color: #ef4444; /* Red title text */
    }

    .redeem-box button {
      margin-top: 15px;
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      background: #8cffb0;
      color: #07120d;
      font-weight: bold;
      cursor: pointer;
    }

    /* ANIMATIONS */
    @keyframes pop {
      from { transform: scale(0.6); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes bounce {
      0% { transform: scale(0); }
      60% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
  </style>
</head>

<body>

<div class="top-bar">
  <h1>🛍 Rewards Store</h1>
  <button class="back-btn" onclick="window.location.href='dashboard.html'">
    ← Back
  </button>
</div>

<div class="rewards-grid">

  <div class="reward-card">
    <h3>💰 Cash Out</h3>
    <p>100 CC = 1 QAR</p>
    <button onclick="redeem('cash', 1000)">Redeem 1000 CC</button>
  </div>

  <div class="reward-card">
    <h3>🎁 Amazon Voucher</h3>
    <p>500 CC</p>
    <button onclick="redeem('amazon', 500)">Redeem</button>
  </div>

  <div class="reward-card">
    <h3>🍔 Food Voucher</h3>
    <p>300 CC</p>
    <button onclick="redeem('food', 300)">Redeem</button>
  </div>

  <div class="reward-card">
    <h3>🌱 Tree Planting</h3>
    <p>200 CC</p>
    <button onclick="redeem('tree', 200)">Redeem</button>
  </div>

  <div class="reward-card">
    <h3>🎮 PlayStation Gift Card</h3>
    <p>1000 CC</p>
    <button onclick="redeem('playstation', 1000)">Redeem</button>
  </div>

  <div class="reward-card">
    <h3>🎮 Xbox Gift Card</h3>
    <p>1000 CC</p>
    <button onclick="redeem('xbox', 1000)">Redeem</button>
  </div>

  <div class="reward-card">
    <h3>☕ Starbucks Gift Card</h3>
    <p>400 CC</p>
    <button onclick="redeem('starbucks', 400)">Redeem</button>
  </div>

  <div class="reward-card">
    <h3>🎬 Netflix Gift Card</h3>
    <p>700 CC</p>
    <button onclick="redeem('netflix', 700)">Redeem</button>
  </div>

</div>

<!-- REDEEM MODAL -->
<div id="redeem-modal" class="redeem-modal">
  <div class="redeem-box">

    <div id="redeem-icon" class="checkmark">✔</div>

    <h2 id="redeem-title">Success</h2>
    <p id="redeem-text">Processing...</p>

    <button onclick="closeRedeem()">Close</button>

  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- Your internal custom scripts -->
<script src="js/app.js"></script>

<!-- EmailJS integrations -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
  (function(){
    emailjs.init("YOUR_PUBLIC_KEY"); 
  })();
</script>

<!-- BACKUP MODAL LOGIC -->
<script>
  function closeRedeem() {
    const modal = document.getElementById("redeem-modal");
    if (modal) {
      modal.style.display = "none";
      // Clear out the error styling state whenever the modal closes
      modal.classList.remove("error-state");
    }
  }
</script>

</body>
</html>
