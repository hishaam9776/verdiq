<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Verdiq</title>

  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #07120d;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 350px;
      background: #0d1e17;
      padding: 25px;
      border-radius: 12px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #8cffb0;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    a {
      color: #8cffb0;
      text-decoration: none;
      display: block;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>Forgot Password</h2>

  <p style="opacity:0.7;">
    Enter your email and we’ll send you a reset link
  </p>

  <input type="email" id="reset-email" placeholder="Enter your email">

  <button onclick="resetPassword()">Send Reset Link</button>

  <a href="login.html">Back to Login</a>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="js/app.js"></script>

</body>
</html>
