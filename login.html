<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Verdiq</title>

  <link rel="stylesheet" href="css/style.css">

  <style>
    
    .auth-box input {
      display: block;
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    .auth-box button {
      width: 100%;
      padding: 12px;
      background: #8cffb0;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .auth-box a {
      text-decoration: none;
    }
    
  </style>

</head>

<body class="center-page">
  

  <!-- Kept as a div so your existing js/app.js variables don't break -->
  <div class="auth-box">

    <h1>Login</h1>

    <input 
      type="email" 
      id="login-email" 
      placeholder="Enter email"
      required
    >

    <!-- Added an onkeydown listener straight to the password field -->
    <input 
      type="password" 
      id="login-password" 
      placeholder="Enter password"
      onkeydown="checkEnterKey(event)"
      required
    >

    <button onclick="login()">Login</button>
    

    <p style="margin-top:15px;">
      Don't have an account?
      <a href="signup.html">Create one</a>
    </p>

    <p style="margin-top:15px;">
      Forgot password?
      <a href="forgot-password.html">Reset it</a>
    </p>

  </div>

  <!-- Inline shortcut script helper -->
  <script>
    function checkEnterKey(event) {
      // Check if the pressed key is specifically "Enter"
      if (event.key === "Enter") {
        event.preventDefault(); // Prevents accidental page glitches
        login(); // Automatically fires your existing login logic exactly like clicking the button
      }
    }
  </script>

  <!-- =========================
        FIREBASE SDK (FIXED ORDER)
  ========================== -->

  <!-- Firebase Core -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <!-- Your App -->
  <script src="js/app.js"></script>

</body>
</html>
