<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recycling Proof</title>


  
  <!-- FontAwesome Icons for a Premium Look -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #040d09; /* Deeper, richer cinematic dark green/black */
      color: white;
      padding: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    h1 {
      color: #8cffb0;
      text-align: center;
      margin-top: 40px;
      font-weight: 700;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .box {
      width: 100%;
      max-width: 460px;
      margin: 20px auto;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
      padding: 30px;
      border-radius: 24px;
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
    }

    .subtitle-text {
      text-align: center;
      opacity: 0.8;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 28px;
      color: #cbd5e1;
    }

    /* PREMIUM UPGRADED CAMERA UPLOAD TRIGGER PANEL */
    .upload-container {
      margin-bottom: 24px;
    }

    .custom-camera-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(140, 255, 176, 0.03);
      border: 1px dashed rgba(140, 255, 176, 0.3);
      padding: 20px;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .custom-camera-btn:hover {
      border-color: #8cffb0;
      background: rgba(140, 255, 176, 0.08);
      transform: translateY(-2px);
    }

    .icon-wrapper {
      width: 48px;
      height: 48px;
      background: rgba(140, 255, 176, 0.1);
      border: 1px solid rgba(140, 255, 176, 0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8cffb0;
      font-size: 20px;
      transition: all 0.3s;
    }

    .custom-camera-btn:hover .icon-wrapper {
      background: #8cffb0;
      color: #040d09;
      box-shadow: 0 4px 12px rgba(140, 255, 176, 0.3);
    }

    .text-wrapper {
      display: flex;
      flex-direction: column;
    }

    .text-wrapper span {
      color: #f8fafc;
      font-size: 15px;
      font-weight: 600;
    }

    .text-wrapper small {
      color: #64748b;
      font-size: 12px;
      margin-top: 3px;
    }

    /* LIVE PREVIEW INDICATION ACCENT */
    #file-selected-badge {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.2);
      color: #34d399;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 12px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* PREMIUM INTERACTIVE CONTROL BUTTONS */
    button {
      width: 100%;
      margin-top: 14px;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: #8cffb0;
      font-weight: 700;
      font-size: 15px;
      color: #040d09;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(140, 255, 176, 0.15);
      transition: all 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      background: #a3ffc2;
      box-shadow: 0 6px 16px rgba(140, 255, 176, 0.25);
    }

    button:active {
      transform: translateY(1px);
    }

    .back {
      margin-top: 14px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #94a3b8;
      box-shadow: none;
    }

    .back:hover {
      background: rgba(255, 255, 255, 0.03);
      color: #f1f5f9;
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: none;
    }
  </style>
</head>

<body>

<h1><i class="fas fa-leaf"></i> Submit Recycling Proof</h1>

<div class="box">

  <p class="subtitle-text">Snap a live picture of your recycling activity right now or upload a file from your library to claim your 20 Carbon Credits instantly.</p>

  <div class="upload-container">
    <!-- Clickable UX Button Layer targeting the hidden element layout -->
    <label for="recycle-file" class="custom-camera-btn">
      <div class="icon-wrapper">
        <i class="fas fa-camera"></i>
      </div>
      <div class="text-wrapper">
        <span>Capture or Upload Image</span>
        <small>Forces camera on phones & tablets</small>
      </div>
    </label>

    <!-- NATIVE SYSTEM FORCING INPUT PIN: capture="environment" launches raw camera app viewport on smartphones -->
    <input 
      type="file" 
      id="recycle-file" 
      accept="image/*" 
      capture="environment" 
      style="display: none;"
      onchange="displaySelectionName()"
    />

    <!-- Small UI Confirmation Badge -->
    <div id="file-selected-badge">
      <i class="fas fa-check-circle"></i> <span id="file-name-string">Image Ready</span>
    </div>
  </div>

  <button onclick="uploadRecycling()"><i class="fas fa-cloud-upload-alt" style="margin-right: 6px;"></i> Submit Proof</button>

  <button class="back" onclick="window.location.href='dashboard.html'">
    <i class="fas fa-arrow-left" style="margin-right: 6px;"></i> Back to Dashboard
  </button>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- APPLICATION SCRIPT -->
<script src="js/app.js"></script>

<script>
  // Simple listener loop feedback to let users see their image loaded cleanly
  function displaySelectionName() {
    const fileInput = document.getElementById("recycle-file");
    const badge = document.getElementById("file-selected-badge");
    const nameString = document.getElementById("file-name-string");

    if (fileInput.files.length > 0) {
      nameString.textContent = "Photo Loaded (" + fileInput.files[0].name.substring(0, 20) + "...)";
      badge.style.display = "inline-flex";
    }
  }

  // Auth Route Guard Check
  auth.onAuthStateChanged(user => {
    if (!user) {
      alert("Session expired. Please log back in.");
      window.location.href = "login.html";
    }
  });
</script>

</body>
</html>
